name: Build & Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      component:
        description: Force-publish this component even if its files didn't change in the last push
        type: choice
        default: all
        options:
          - all
          - backend
          - frontend
          - audio-analysis
          - mobile

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint

  # Decides which of backend/frontend/audio-analysis/mobile should publish:
  # on a push, whichever actually changed (via dorny/paths-filter, diffed
  # against the pre-push commit); on a manual workflow_dispatch run, whichever
  # the `component` input names (or all of them) — a push has no "component"
  # input, and a manual dispatch has no before/after commit range to diff, so
  # each event type is handled its own way in the "Decide what to publish"
  # step below, which is what every publish job's `if:` actually reads.
  changes:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      repo-lc: ${{ steps.repo.outputs.lc }}
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
      audio-analysis: ${{ steps.decide.outputs.audio-analysis }}
      mobile: ${{ steps.decide.outputs.mobile }}
    steps:
      - name: Compute lowercase repository name
        id: repo
        run: echo "lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      # paths-filter needs an actual git repo to diff against — fetch-depth 0
      # (full history) rather than the default shallow depth-1 clone, since a
      # push can carry more than one commit and a depth-1 clone wouldn't have
      # github.event.before locally to diff against.
      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            audio-analysis:
              - 'audio-analysis/**'
            mobile:
              - 'mobile/**'

      - name: Decide what to publish
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          COMPONENT: ${{ inputs.component }}
          CHANGED_BACKEND: ${{ steps.filter.outputs.backend }}
          CHANGED_FRONTEND: ${{ steps.filter.outputs.frontend }}
          CHANGED_AUDIO_ANALYSIS: ${{ steps.filter.outputs.audio-analysis }}
          CHANGED_MOBILE: ${{ steps.filter.outputs.mobile }}
        run: |
          decide() {
            local name="$1" changed="$2"
            if [ "$EVENT" = "workflow_dispatch" ]; then
              if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "$name" ]; then
                echo "true"
              else
                echo "false"
              fi
            else
              echo "$changed"
            fi
          }
          {
            echo "backend=$(decide backend "$CHANGED_BACKEND")"
            echo "frontend=$(decide frontend "$CHANGED_FRONTEND")"
            echo "audio-analysis=$(decide audio-analysis "$CHANGED_AUDIO_ANALYSIS")"
            echo "mobile=$(decide mobile "$CHANGED_MOBILE")"
          } >> "$GITHUB_OUTPUT"

  publish-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/backend:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/frontend:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-audio-analysis:
    needs: changes
    if: needs.changes.outputs.audio-analysis == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./audio-analysis
          # amd64-only — essentia-tensorflow (see audio-analysis/requirements.txt)
          # has no arm64 Linux wheel, so an arm64 build would just fail here.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/audio-analysis:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/audio-analysis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android-apk:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    # Beyond the default contents: read — needed to create/update the
    # GitHub Release below.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Compute short SHA
        id: sha
        env:
          SHA: ${{ github.sha }}
        run: echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      # Generates the native android/ project from app.json — gitignored,
      # regenerated fresh on every run (same as a developer running
      # `expo prebuild` locally before opening Android Studio). Runs
      # non-interactively because GitHub Actions sets CI=true. Must happen
      # before setup-java below: its `cache: gradle` option hashes gradle
      # files (gradlew, gradle-wrapper.properties, etc.) to key the cache,
      # and those don't exist until this step generates them.
      - name: Prebuild native Android project
        working-directory: mobile
        run: npx expo prebuild --platform android

      # The Expo/RN template's debug.keystore is a static file bundled with
      # the tooling itself — the exact same key shipped in every
      # unconfigured RN/Expo project, so it carries no real signing
      # identity. This overwrites it with a private one only this repo's
      # maintainer holds (generated locally, stored as this secret — see
      # README), so consecutive builds actually share a stable identity and
      # install as an in-place update instead of needing an uninstall each
      # time. Same alias/password convention build.gradle already expects
      # (androiddebugkey / android), so no build.gradle changes needed —
      # just swap the file's bytes before the build reads it.
      - name: Install stable signing keystore
        working-directory: mobile
        env:
          KEYSTORE_B64: ${{ secrets.MOBILE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::MOBILE_KEYSTORE_BASE64 secret not set — falling back to the public template debug key, so this build won't share a signing identity with prior/future builds. See README's Mobile section."
          else
            echo "$KEYSTORE_B64" | base64 -d > android/app/debug.keystore
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # Debug-signed (see the signing-keystore step above for what actually
      # backs that now) — fine to sideload, not for Play Store distribution.
      # EXPO_PUBLIC_* vars here are read by src/hooks/useUpdateCheck.ts,
      # baked into the JS bundle at this step (Metro bundling runs as part
      # of this gradle task) so a running app can identify its own build and
      # compare it against the GitHub Release published below.
      - name: Build debug APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_BUILD_SHA: ${{ steps.sha.outputs.short }}
          EXPO_PUBLIC_GITHUB_REPO: ${{ github.repository }}
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/debug/app-debug.apk YoutubeVault-debug.apk

      # The release this build's own useUpdateCheck() (see above) compares
      # itself against on every other user's already-installed app. Tag
      # includes the short SHA (not app.json's static version field) so
      # every build gets its own release with no manual version bumping —
      # re-running for the same commit just updates that release in place.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-${{ steps.sha.outputs.short }}
          name: Mobile ${{ steps.sha.outputs.short }}
          files: YoutubeVault-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: YoutubeVault-debug-apk
          path: YoutubeVault-debug.apk
          retention-days: 30
