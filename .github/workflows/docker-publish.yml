name: Docker Publish

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
            platforms: linux/amd64,linux/arm64
          - image: frontend
            context: ./frontend
            platforms: linux/amd64,linux/arm64
          # amd64-only — essentia-tensorflow (see audio-analysis/requirements.txt)
          # has no arm64 Linux wheel, so an arm64 build would just fail here.
          - image: audio-analysis
            context: ./audio-analysis
            platforms: linux/amd64
    steps:
      - uses: actions/checkout@v4

      # Docker image refs must be lowercase; GitHub repo names/owners aren't guaranteed to be.
      - name: Compute lowercase repository name
        run: echo "REPO_LC=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: ${{ matrix.platforms }}
          push: true
          tags: |
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.image }}:latest
            ghcr.io/${{ env.REPO_LC }}/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
