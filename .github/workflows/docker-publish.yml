name: Build & Publish

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      component:
        description: Force-publish this component even if its files didn't change in the last push
        type: choice
        default: all
        options:
          - all
          - backend
          - frontend
          - audio-analysis
          - mobile

permissions:
  contents: read
  packages: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npm run lint

  changes:
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      repo-lc: ${{ steps.repo.outputs.lc }}
      backend: ${{ steps.decide.outputs.backend }}
      frontend: ${{ steps.decide.outputs.frontend }}
      audio-analysis: ${{ steps.decide.outputs.audio-analysis }}
      mobile: ${{ steps.decide.outputs.mobile }}
    steps:
      - name: Compute lowercase repository name
        id: repo
        run: echo "lc=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: github.event_name == 'push'
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            audio-analysis:
              - 'audio-analysis/**'
            mobile:
              - 'mobile/**'

      - name: Decide what to publish
        id: decide
        env:
          EVENT: ${{ github.event_name }}
          COMPONENT: ${{ inputs.component }}
          CHANGED_BACKEND: ${{ steps.filter.outputs.backend }}
          CHANGED_FRONTEND: ${{ steps.filter.outputs.frontend }}
          CHANGED_AUDIO_ANALYSIS: ${{ steps.filter.outputs.audio-analysis }}
          CHANGED_MOBILE: ${{ steps.filter.outputs.mobile }}
        run: |
          decide() {
            local name="$1" changed="$2"
            if [ "$EVENT" = "workflow_dispatch" ]; then
              if [ "$COMPONENT" = "all" ] || [ "$COMPONENT" = "$name" ]; then
                echo "true"
              else
                echo "false"
              fi
            else
              echo "$changed"
            fi
          }
          {
            echo "backend=$(decide backend "$CHANGED_BACKEND")"
            echo "frontend=$(decide frontend "$CHANGED_FRONTEND")"
            echo "audio-analysis=$(decide audio-analysis "$CHANGED_AUDIO_ANALYSIS")"
            echo "mobile=$(decide mobile "$CHANGED_MOBILE")"
          } >> "$GITHUB_OUTPUT"

  publish-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
        with:
          # Default pinned QEMU is too old to correctly emulate some
          # instructions Prisma's arm64 query-engine binary uses, causing
          # "Illegal instruction (core dumped)" during `prisma generate`
          # under emulation — this pulls a current QEMU build instead.
          image: tonistiigi/binfmt:latest
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/backend:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-frontend:
    needs: [changes, android-apk]
    if: |
      !failure() && !cancelled() &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.mobile == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built APK
        uses: actions/download-artifact@v4
        with:
          name: YoutubeVault-apk
          path: frontend/public/download

      - uses: docker/setup-qemu-action@v3
        with:
          # Same fix as the backend job — see comment there.
          image: tonistiigi/binfmt:latest
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/frontend:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-audio-analysis:
    needs: changes
    if: needs.changes.outputs.audio-analysis == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./audio-analysis
          # amd64-only — essentia-tensorflow (see audio-analysis/requirements.txt)
          # has no arm64 Linux wheel, so an arm64 build would just fail here.
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/audio-analysis:latest
            ghcr.io/${{ needs.changes.outputs.repo-lc }}/audio-analysis:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  android-apk:
    needs: changes
    if: needs.changes.outputs.mobile == 'true' || needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    # Beyond the default contents: read — needed to create/update the
    # GitHub Release below.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Compute short SHA
        id: sha
        env:
          SHA: ${{ github.sha }}
        run: echo "short=${SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Determine build SHA
        id: build_sha
        env:
          GH_TOKEN: ${{ github.token }}
          MOBILE_CHANGED: ${{ needs.changes.outputs.mobile }}
          CURRENT_SHA: ${{ steps.sha.outputs.short }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$MOBILE_CHANGED" = "true" ]; then
            echo "sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
          else
            latest_tag=$(gh release view --repo "$REPO" --json tagName -q .tagName 2>/dev/null || true)
            if [ -n "$latest_tag" ]; then
              echo "sha=${latest_tag#mobile-}" >> "$GITHUB_OUTPUT"
            else
              echo "sha=$CURRENT_SHA" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - name: Prebuild native Android project
        working-directory: mobile
        run: npx expo prebuild --platform android

      - name: Install stable signing keystore
        working-directory: mobile
        env:
          KEYSTORE_B64: ${{ secrets.MOBILE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::warning::MOBILE_KEYSTORE_BASE64 secret not set — falling back to the public template debug key, so this build won't share a signing identity with prior/future builds. See README's Mobile section."
          else
            echo "$KEYSTORE_B64" | base64 -d > android/app/debug.keystore
          fi

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build release APK
        working-directory: mobile/android
        env:
          EXPO_PUBLIC_BUILD_SHA: ${{ steps.build_sha.outputs.sha }}
          EXPO_PUBLIC_GITHUB_REPO: ${{ github.repository }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp mobile/android/app/build/outputs/apk/release/app-release.apk YoutubeVault.apk

      - name: Publish GitHub Release
        if: needs.changes.outputs.mobile == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-${{ steps.sha.outputs.short }}
          name: Mobile ${{ steps.sha.outputs.short }}
          files: YoutubeVault.apk

      - uses: actions/upload-artifact@v4
        with:
          name: YoutubeVault-apk
          path: YoutubeVault.apk
          retention-days: 30
